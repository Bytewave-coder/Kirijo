name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Verify Java Version
        run: java -version

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js App
        run: npm run build

      - name: Install Capacitor v6
        run: |
          npm install @capacitor/core@6.1.2
          npm install @capacitor/cli@6.1.2
          npm install @capacitor/android@6.1.2

      - name: Create Android Project
        run: |
          npx cap add android || true

      - name: Sync Capacitor
        run: |
          npx cap sync android

      - name: Install Capacitor Assets
        run: |
          npm install -g @capacitor/assets

      - name: Generate Android Icons
        run: |
          capacitor-assets generate --android || true

      - name: Inject Kotlin Native Files
        run: |
          mkdir -p android/app/src/main/java/com/byteswave/kirijo
          cp kotlin-native/*.kt android/app/src/main/java/com/byteswave/kirijo/ || true

      - name: Create Android Manifest
        run: |
          mkdir -p android/app/src/main

          cat <<'EOF' > android/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.byteswave.kirijo">

              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>

              <application
                  android:allowBackup="true"
                  android:label="Kirijo"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true">

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>

                  </activity>

              </application>

          </manifest>
          EOF

      - name: Force Java 17 Compatibility
        run: |
          find android -name "*.gradle" -type f -exec sed -i 's/VERSION_21/VERSION_17/g' {} \;
          find android -name "*.gradle" -type f -exec sed -i 's/jvmTarget = "21"/jvmTarget = "17"/g' {} \;
          find android -name "*.gradle" -type f -exec sed -i 's/sourceCompatibility = JavaVersion.VERSION_21/sourceCompatibility = JavaVersion.VERSION_17/g' {} \;
          find android -name "*.gradle" -type f -exec sed -i 's/targetCompatibility = JavaVersion.VERSION_21/targetCompatibility = JavaVersion.VERSION_17/g' {} \;

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease --stacktrace

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release-unsigned.apk android/app/build/outputs/apk/release/kirijo-release.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kirijo-release-apk
          path: android/app/build/outputs/apk/release/kirijo-release.apk
