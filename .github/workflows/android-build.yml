name: Build Android APK

on:
  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Verify Java Version
        run: java -version

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js App
        run: npm run build

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Create Android Project
        run: |
          npx cap add android || true

      - name: Sync Capacitor
        run: |
          npx cap sync android

      - name: Add Android Permissions
        run: |
          sed -i '/<manifest/a\
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>\
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE"/>' android/app/src/main/AndroidManifest.xml

      - name: Add Launcher Activity
        run: |
          sed -i '/<activity/a\
                  <intent-filter>\
                      <action android:name="android.intent.action.MAIN" />\
                      <category android:name="android.intent.category.LAUNCHER" />\
                  </intent-filter>' android/app/src/main/AndroidManifest.xml

      - name: Force Java 17 Compatibility
        run: |
          echo '
          android {
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          ' >> android/app/build.gradle

          echo '
          org.gradle.java.home=/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.19-10/x64
          ' >> android/gradle.properties

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release-unsigned.apk kirijo.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kirijo-release-apk
          path: kirijo.apk
