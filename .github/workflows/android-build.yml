name: Build Android APK

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js App
        run: npm run build

      - name: Export Static Files
        run: |
          npx next export || true

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Create Android Project
        run: |
          npx cap add android || true

      - name: Sync Capacitor
        run: |
          npx cap sync android

      - name: Install Capacitor Assets
        run: |
          npm install -g @capacitor/assets

      - name: Generate Android Icons
        run: |
          capacitor-assets generate --android

      - name: Inject Kotlin Native Files
        run: |
          mkdir -p android/app/src/main/java/com/byteswave/kirijo
          cp kotlin-native/*.kt android/app/src/main/java/com/byteswave/kirijo/ || true

      - name: Fix Android Gradle Settings
        run: |
          cat <<'EOF' >> android/app/build.gradle

          android {
              namespace "com.byteswave.kirijo"

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
              kotlinOptions {
                  jvmTarget = "17"
              }
          }

          EOF

      - name: Add WorkManager Dependency
        run: |
          sed -i '/dependencies {/a\
              implementation "androidx.work:work-runtime-ktx:2.9.0"' \
              android/app/build.gradle

      - name: Force Kotlin Dependency Version
        run: |
          cat <<'EOF' >> android/build.gradle

          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  }
              }
          }

          EOF

      - name: Remove Invalid Manifest Package
        run: |
          sed -i 's/package="com.byteswave.kirijo"//g' \
          android/app/src/main/AndroidManifest.xml || true

      - name: Force Java 17 Everywhere
        run: |
          find android -type f \( -name "*.gradle" -o -name "*.gradle.kts" \) \
          -exec sed -i 's/VERSION_21/VERSION_17/g' {} \;

          find android -type f \( -name "*.gradle" -o -name "*.gradle.kts" \) \
          -exec sed -i 's/jvmTarget = "21"/jvmTarget = "17"/g' {} \;

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kirijo-release-apk
          path: android/app/build/outputs/apk/release/*.apk
